name: 🎮 FreezeHost 自动续期
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 💾 获取 Playwright 版本
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: 📁 缓存 Playwright 浏览器
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: 🌐 安装 Playwright 浏览器
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 准备 AdGuard 插件目录
        id: adguard-setup
        run: |
          ADGUARD_DIR="./adguard-unpacked"
          ADGUARD_VERSION="v2.15.4"  # 🔸 建议固定版本，避免 API 变动导致失败
          ADGUARD_URL="https://github.com/AdguardTeam/AdGuardBrowserExtension/releases/download/${ADGUARD_VERSION}/adguard-chrome-dev.zip"
          
          # 1. 尝试从缓存恢复
          echo "🔍 检查缓存..."
          if [ -d "$ADGUARD_DIR/manifest.json" ]; then
            echo "✅ 缓存命中，跳过下载"
            echo "path=$ADGUARD_DIR" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 2. 下载 + 解压（带重试）
          echo "📥 下载 AdGuard ${ADGUARD_VERSION}..."
          for i in {1..3}; do
            curl -fsSL "$ADGUARD_URL" -o adguard.zip && break || {
              echo "⚠️ 第 $i 次下载失败，3 秒后重试..."
              sleep 3
            }
          done
          
          # 3. 解压（确保是 unpacked 格式）
          mkdir -p "$ADGUARD_DIR"
          unzip -q adguard.zip -d "$ADGUARD_DIR"
          rm -f adguard.zip
          
          # 4. 验证 manifest.json 存在
          if [ ! -f "$ADGUARD_DIR/manifest.json" ]; then
            echo "❌ 解压失败：未找到 manifest.json"
            ls -la "$ADGUARD_DIR"
            exit 1
          fi
          
          echo "✅ AdGuard 准备完成: $ADGUARD_DIR"
          echo "path=$ADGUARD_DIR" >> $GITHUB_OUTPUT
      
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🚀 运行续期脚本
        env:
          DISCORD_TOKEN:   ${{ secrets.DISCORD_TOKEN }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
